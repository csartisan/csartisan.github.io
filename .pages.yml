media: /assets/images/posts
content:
  - name: articles
    label: Articles
    # PATH TO ARTICLES
    path: _posts
    type: collection
    fields: 
      - { name: title, label: Title, type: string, required: true }
      - { name: author, label: Author, type: string, required: true }
      - name: categories
        label: Category
        type: select
        required: true
        default: [ misc ]
        options:
          # ALL CATEGORIES
          values: [ Updates, Academics, Conservatory, Events, Productions, Student-Life, Campus, Reviews, Spotlight, Essays ]
      - { name: image, label: Image, type: image, required: true }
      - { name: date, label: Date, type: date, required: true }
      - name: jumbotron
        label: Jumbotron
        type: boolean
        default: false
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: order
        label: Order
        type: number
        options:
          min: 1
          max: 4
      - { name: body, label: Body, type: rich-text, required: true }